server {
    listen 47822 ssl;
    http2 on;
    server_name diegomusic.com;

    ssl_certificate     /etc/nginx/certs/diegomusic.com.pem;
    ssl_certificate_key /etc/nginx/certs/diegomusic.com-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
